    <!-- SPA redirect handler for GitHub Pages -->

            title: "Mac",

                  "Abra o Codex.",
                  "Clique em Abrir.",
                  "Escolha a pasta do seu projeto.",
                  "Clique em Abrir.",
                  "Pronto. Agora o Codex vai funcionar com o Superagente dentro do seu projeto."
                ]
              },
              {
                title: "Como saber se esta certo no Mac",
                description: "Assim que a pasta abrir no Codex, peca para o aluno fazer este teste simples.",
                steps: [
                  "Crie um chat novo.",
                  "Envie a mensagem abaixo exatamente como esta.",
                  "Se deu certo, o Codex vai responder de forma mais guiada, mais clara e mais organizada."
                ],
                prompt: "Leia o arquivo AGENTS.md deste projeto e assuma esse comportamento como seu padrao. Primeiro, me explique em linguagem simples o que voce entendeu sobre sua forma de atuar.",
                variant: "check"
              }
            ]
          },
          windows: {
            title: "Windows",
            intro: "Escolha abaixo o caminho certo para o aluno seguir no Windows. A regra continua a mesma: a pasta aberta no Codex precisa conter o arquivo AGENTS.md.",
            blocks: [
              {
                title: "Caso 1: usar so o Superagente",
                description: "Use este caminho quando o aluno quiser abrir apenas a pasta recebida, sem colocar dentro de outro projeto.",
                steps: [
                  "Va para a Area de Trabalho.",
                  "Encontre a pasta Superagente-para-Alunos.",
                  "Abra o aplicativo Codex.",
                  "Clique em Abrir ou Open.",
                  "Vai aparecer uma janela para escolher uma pasta.",
                  "Nessa janela, va ate a Area de Trabalho.",
                  "Clique na pasta Superagente-para-Alunos.",
                  "Clique em Open, Abrir ou Selecionar pasta.",
                  "Pronto. Agora o Codex esta trabalhando dentro dessa pasta."
                ]
              },
              {
                title: "Caso 2: usar o Superagente dentro do seu proprio projeto",
                description: "Use este caminho quando o aluno ja tiver uma pasta dele, como Meu Site, Meu App ou Projeto da Aula.",
                steps: [
                  "Va ate a pasta Superagente-para-Alunos.",
                  "Abra essa pasta.",
                  "Selecione os arquivos que estao dentro dela.",
                  "Copie esses arquivos.",
                  "Va ate a pasta principal do seu projeto.",
                  "Cole esses arquivos dentro da pasta do seu projeto.",
                  "Confirme que o arquivo AGENTS.md esta dentro da pasta do projeto.",
                  "Abra o Codex.",
                  "Clique em Abrir ou Open.",
                  "Escolha a pasta do seu projeto.",
                  "Clique em Open, Abrir ou Selecionar pasta.",
                  "Pronto. Agora o Codex vai usar o Superagente dentro do seu projeto."
                ]
              },
              {
                title: "Como saber se esta certo no Windows",
                description: "Assim que a pasta abrir no Codex, peca para o aluno fazer este teste simples.",
                steps: [
                  "Crie um chat novo.",
                  "Envie a mensagem abaixo exatamente como esta.",
                  "Se deu certo, ele vai responder como um agente mais inteligente, mais cuidadoso e mais autonomo."
                ],
                prompt: "Leia o arquivo AGENTS.md deste projeto e assuma esse comportamento como seu padrao. Primeiro, me explique em linguagem simples o que voce entendeu sobre sua forma de atuar.",
                variant: "check"
              }
            ]
          }
        };

        const createPremiumGuide = function() {
          const guide = document.createElement("div");
          guide.className = "premium-guide";

          const intro = document.createElement("p");
          intro.className = "premium-guide-intro";
          guide.appendChild(intro);

          const platformTabs = document.createElement("div");
          platformTabs.className = "premium-platforms";
          guide.appendChild(platformTabs);

          const panels = document.createElement("div");
          guide.appendChild(panels);

          const renderPanel = function(key) {
            const data = premiumContent[key];
            intro.textContent = data.intro;

            Array.from(platformTabs.children).forEach(function(button) {
              button.classList.toggle("is-active", button.dataset.platform === key);
            });

            Array.from(panels.children).forEach(function(panel) {
              panel.classList.toggle("is-active", panel.dataset.platform === key);
            });
          };

          Object.keys(premiumContent).forEach(function(key, index) {
            const data = premiumContent[key];

            const button = document.createElement("button");
            button.type = "button";
            button.className = "premium-platform" + (index === 0 ? " is-active" : "");
            button.dataset.platform = key;
            button.textContent = data.title;
            button.addEventListener("click", function() {
              renderPanel(key);
            });
            platformTabs.appendChild(button);

            const panel = document.createElement("div");
            panel.className = "premium-panel" + (index === 0 ? " is-active" : "");
            panel.dataset.platform = key;

            data.blocks.forEach(function(block) {
              const card = document.createElement("div");
              card.className = "premium-card" + (block.variant === "check" ? " premium-check" : "");

              const title = document.createElement("h4");
              title.textContent = block.title;
              card.appendChild(title);

              const description = document.createElement("p");
              description.textContent = block.description;
              card.appendChild(description);

              const steps = document.createElement("ol");
              steps.className = "premium-steps";

              block.steps.forEach(function(step) {
                const item = document.createElement("li");
                item.textContent = step;
                steps.appendChild(item);
              });

              card.appendChild(steps);

              if (block.prompt) {
                const prompt = document.createElement("code");
                prompt.className = "premium-prompt";
                prompt.textContent = block.prompt;
                card.appendChild(prompt);
              }

              panel.appendChild(card);
            });

            const ruleCard = document.createElement("div");
            ruleCard.className = "premium-card premium-check";
            ruleCard.innerHTML = [
              "<h4>A regra mais importante de todas</h4>",
              "<p>Se o aluno esquecer tudo, ele so precisa lembrar disso: a pasta aberta no Codex precisa ter o arquivo AGENTS.md dentro dela.</p>"
            ].join("");
            panel.appendChild(ruleCard);

            const errorCard = document.createElement("div");
            errorCard.className = "premium-card premium-warning";
            errorCard.innerHTML = [
              "<h4>O erro mais comum</h4>",
              "<p>O erro mais comum e este: o aluno coloca o AGENTS.md em uma pasta, mas abre outra pasta diferente no Codex. Se isso acontecer, o Superagente nao entra em acao.</p>"
            ].join("");
            panel.appendChild(errorCard);

            panels.appendChild(panel);
          });

          return guide;
        };

        const helper = function() {
          const paragraphs = Array.from(document.querySelectorAll("p"));
          const targets = paragraphs.filter(function(node) {
            return node.textContent && node.textContent.includes("Resposta aberta, com suas palavras.");
          });

          targets.forEach(function(node, index) {
            const host = node.parentElement;
            if (!host || host.querySelector(".challenge-response")) return;

            const wrapper = document.createElement("div");
            wrapper.className = "challenge-response";
            wrapper.innerHTML = [
              '<div class="challenge-response-header">',
              '<span>Espaco de resposta</span>',
              '<span>Ate 2 pontos</span>',
              "</div>",
              '<textarea placeholder="Escreva aqui sua resposta da pergunta ' + (index + 1) + '..."></textarea>'
            ].join("");
            host.appendChild(wrapper);
          });

          const premiumHeading = Array.from(document.querySelectorAll("h1, h2, h3, h4, h5, h6, p, span, div")).find(function(node) {
            return node.textContent && node.textContent.trim() === "Entregaveis Premium";
          });

          if (premiumHeading) {
            const host = premiumHeading.closest("section") || premiumHeading.parentElement;
            if (host && !host.querySelector(".premium-guide")) {
              host.appendChild(createPremiumGuide());
            }
          }
        };

        const observer = new MutationObserver(helper);
        observer.observe(document.documentElement, { childList: true, subtree: true });
        helper();
        window.addEventListener("load", helper);
      })();
    </script>
